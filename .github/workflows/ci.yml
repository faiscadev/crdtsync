name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on new push to the same branch/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which paths changed so downstream jobs can skip if their
  # area is untouched. PRs and pushes both supported by dorny/paths-filter.
  changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      core: ${{ steps.filter.outputs.core }}
      sdk-ocaml: ${{ steps.filter.outputs.sdk-ocaml }}
      sdk-ts: ${{ steps.filter.outputs.sdk-ts }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            core:
              - 'core/**'
              - 'dune-project'
              - 'crdtsync.opam'
              - 'crdtsync_core.opam'
            sdk-ocaml:
              - 'core/lib/crdt/**'
              - 'core/lib/wire/**'
              - 'sdks/ocaml/**'
              - 'dune-project'
              - 'crdtsync_sdk.opam'
            sdk-ts:
              - 'sdks/typescript/**'

  core:
    name: Core (OCaml) — build + test
    needs: changes
    if: needs.changes.outputs.core == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"
          dune-cache: true
      - run: opam install . --deps-only --with-test --yes
      - run: opam exec -- dune build
      - run: opam exec -- dune runtest

  sdk-ocaml:
    name: OCaml SDK — build + test
    needs: changes
    if: needs.changes.outputs.sdk-ocaml == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.2"
          dune-cache: true
      - run: opam install . --deps-only --with-test --yes
      - run: opam exec -- dune build sdks/ocaml/
      - run: opam exec -- dune runtest sdks/ocaml/

  sdk-ts:
    name: TypeScript SDK — typecheck + test + build
    needs: changes
    if: needs.changes.outputs.sdk-ts == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdks/typescript
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: "10"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm
          cache-dependency-path: sdks/typescript/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
