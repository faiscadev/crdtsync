name: Rust

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Format check
        run: cargo fmt --check
      - name: Test
        run: cargo test --workspace

  miri:
    runs-on: ubuntu-latest
    # Miri is the memory gate: UB + leaks, deterministic and cross-platform.
    # One shard per crate so the three run in parallel — wall-clock is the
    # slowest single crate, not the sum. Within each shard: a warm build cache
    # skips the cold Miri codegen + sysroot rebuild, and nextest fans the tests
    # across cores instead of one serial process.
    strategy:
      fail-fast: false
      matrix:
        crate: [crdtsync-core, crdtsync-ffi, crdtsync-server]
    steps:
      - uses: actions/checkout@v5
      - name: Install Miri
        run: rustup toolchain install nightly --component miri
      - uses: taiki-e/install-action@nextest
      - uses: Swatinem/rust-cache@v2
        with:
          # Per-crate key so the three shards keep separate caches instead of
          # clobbering one; the Miri-built std sysroot lives under ~/.cache/miri.
          prefix-key: miri
          key: ${{ matrix.crate }}
          cache-directories: ~/.cache/miri
          cache-on-failure: true
      - name: Build the Miri sysroot
        run: cargo +nightly miri setup
      - name: Miri
        run: cargo +nightly miri nextest run -p ${{ matrix.crate }}

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The SDK loads the cdylib at runtime; build it, then run pytest.
      - name: Build the native library
        run: cargo build -p crdtsync-ffi
      - name: Install pytest
        run: python -m pip install --upgrade pytest
      - name: Test
        run: python -m pytest -q
        working-directory: sdks/python
        env:
          PYTHONPATH: .

  go-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: "1.21"
      # cgo links the static library; build it, then run go test.
      - name: Build the native library
        run: cargo build -p crdtsync-ffi --release
      - name: Test
        run: go test ./...
        working-directory: sdks/go

  wasm-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install the wasm target
        run: rustup target add wasm32-unknown-unknown
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Test
        run: wasm-pack test --node
        working-directory: crates/wasm
