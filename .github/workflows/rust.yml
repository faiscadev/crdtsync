name: Rust

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Format check
        run: cargo fmt --check
      - name: Test
        run: cargo test --workspace

  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Miri is the memory gate: UB + leaks, deterministic and cross-platform.
      - name: Install Miri
        run: rustup toolchain install nightly --component miri
      - name: Miri
        run: cargo +nightly miri test -p crdtsync-core -p crdtsync-ffi

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # The SDK loads the cdylib at runtime; build it, then run pytest.
      - name: Build the native library
        run: cargo build -p crdtsync-ffi
      - name: Test
        run: python -m pytest -q
        working-directory: sdks/python
        env:
          PYTHONPATH: .
