name: Rust

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Format check
        run: cargo fmt --check
      - name: Test
        run: cargo test --workspace

  miri:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      # Miri is the memory gate: UB + leaks, deterministic and cross-platform.
      - name: Install Miri
        run: rustup toolchain install nightly --component miri
      - name: Miri
        run: cargo +nightly miri test -p crdtsync-core -p crdtsync-ffi
